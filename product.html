<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Product</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #fafafa; color: #111; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 32px; background: #fff; border-bottom: 1px solid #e5e5e5;
    position: sticky; top: 0; z-index: 10;
  }
  header a { text-decoration: none; color: inherit; }
  .logo { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .nav-right { display: flex; gap: 20px; align-items: center; }
  .nav-right a { font-size: 14px; color: #555; }
  .cart-link {
    background: #111; color: #fff !important;
    padding: 8px 16px; border-radius: 6px; font-size: 14px; font-weight: 600;
  }
  main { max-width: 960px; margin: 48px auto; padding: 0 24px; }
  .back { font-size: 13px; color: #888; text-decoration: none; display: inline-block; margin-bottom: 28px; }
  .back:hover { color: #111; }
  .product-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: start; }
  @media (max-width: 640px) { .product-layout { grid-template-columns: 1fr; } }
  .product-img {
    aspect-ratio: 1; background: linear-gradient(135deg, #f5f5f5, #e8e8e8); border-radius: 10px; overflow: hidden;
    display: flex; align-items: center; justify-content: center; color: #aaa;
  }
  .product-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .product-info { display: flex; flex-direction: column; gap: 16px; }
  .product-name { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  .product-price { font-size: 24px; font-weight: 700; }
  .product-desc { font-size: 15px; color: #555; line-height: 1.7; }
  .qty-row { display: flex; align-items: center; gap: 12px; }
  .qty-row label { font-size: 13px; font-weight: 600; color: #666; }
  .qty-row select {
    padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px;
    font-size: 14px; background: #fff; font-family: inherit;
  }
  .btn {
    padding: 14px 24px; border-radius: 6px; font-size: 15px;
    font-weight: 600; cursor: pointer; border: none; font-family: inherit;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: #111; color: #fff; width: 100%; }
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: #111; color: #fff; padding: 12px 20px;
    border-radius: 8px; font-size: 14px; font-weight: 600;
    opacity: 0; transform: translateY(8px);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none; z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  #loading { text-align: center; padding: 60px; color: #888; font-size: 15px; }
  #error { text-align: center; padding: 60px; color: #c00; font-size: 15px; }
</style>
</head>
<body>
<header>
  <a href="/" class="logo">Storexpress</a>
  <div class="nav-right">
    <a href="/admin.html">Admin</a>
    <a href="/cart.html" class="cart-link">Cart (<span id="cart-count">0</span>)</a>
  </div>
</header>
<main>
  <a href="/" class="back">← Back to store</a>
  <div id="loading">Loading product...</div>
  <div id="error" style="display:none">Product not found.</div>
  <div id="product" style="display:none">
    <div class="product-layout">
      <div class="product-img" id="img-wrap"><img id="product-img" src="" alt=""/></div>
      <div class="product-info">
        <div class="product-name" id="product-name"></div>
        <div class="product-price" id="product-price"></div>
        <div class="product-desc" id="product-desc"></div>
        <div class="qty-row">
          <label for="qty">Qty</label>
          <select id="qty"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option></select>
        </div>
        <button class="btn btn-primary" id="add-btn">Add to Cart</button>
      </div>
    </div>
  </div>
</main>
<div class="toast" id="toast"></div>
<script>
  let currentProduct = null;
  function getCart() { return JSON.parse(localStorage.getItem("cart") || "[]"); }
  function saveCart(cart) {
    localStorage.setItem("cart", JSON.stringify(cart));
    document.getElementById("cart-count").textContent = cart.reduce((s, i) => s + i.qty, 0);
  }
  document.getElementById("add-btn").addEventListener("click", () => {
    if (!currentProduct) return;
    const qty = parseInt(document.getElementById("qty").value, 10);
    const cart = getCart();
    const existing = cart.find(i => i.id === currentProduct.id);
    if (existing) existing.qty += qty;
    else cart.push({ id: currentProduct.id, name: currentProduct.name, price: Number(currentProduct.price), qty });
    saveCart(cart);
    const t = document.getElementById("toast");
    t.textContent = `${currentProduct.name} added to cart`;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2200);
  });
  (async () => {
    document.getElementById("cart-count").textContent = getCart().reduce((s, i) => s + i.qty, 0);
    const id = new URLSearchParams(location.search).get("id");
    if (!id) return showError();
    try {
      const res = await fetch("/products.json", { cache: "no-store" });
      if (!res.ok) throw new Error();
      const products = await res.json();
      currentProduct = products.find(p => p.id === id && p.active !== false);
      if (!currentProduct) throw new Error();
      document.title = currentProduct.name;
      document.getElementById("product-name").textContent = currentProduct.name;
      document.getElementById("product-price").textContent = `$${Number(currentProduct.price).toFixed(2)}`;
      document.getElementById("product-desc").textContent = currentProduct.description;
      const img = document.getElementById("product-img");
      img.src = currentProduct.image;
      img.alt = currentProduct.name;
      img.onerror = () => { img.remove(); document.getElementById("img-wrap").textContent = "No image yet"; };
      document.getElementById("loading").style.display = "none";
      document.getElementById("product").style.display = "block";
    } catch {
      showError();
    }
  })();
  function showError() {
    document.getElementById("loading").style.display = "none";
    document.getElementById("error").style.display = "block";
  }
</script>
</body>
</html>
